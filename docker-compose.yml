version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: rmt_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-rmt_billing}
      MYSQL_USER: ${MYSQL_USER:-rmt_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-rmt_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: rmt_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rmt_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+aiomysql://${MYSQL_USER:-rmt_user}:${MYSQL_PASSWORD:-rmt_password}@mysql:3306/${MYSQL_DATABASE:-rmt_billing}
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-your-super-secret-key-change-in-production}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@rmtbilling.com}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - invoice_pdfs:/app/storage/invoices
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: rmt_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rmt_celery
    restart: unless-stopped
    command: celery -A app.core.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: mysql+aiomysql://${MYSQL_USER:-rmt_user}:${MYSQL_PASSWORD:-rmt_password}@mysql:3306/${MYSQL_DATABASE:-rmt_billing}
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-your-super-secret-key-change-in-production}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
    volumes:
      - ./backend:/app
      - invoice_pdfs:/app/storage/invoices
    depends_on:
      - mysql
      - redis

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rmt_celery_beat
    restart: unless-stopped
    command: celery -A app.core.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: mysql+aiomysql://${MYSQL_USER:-rmt_user}:${MYSQL_PASSWORD:-rmt_password}@mysql:3306/${MYSQL_DATABASE:-rmt_billing}
      REDIS_URL: redis://redis:6379
    volumes:
      - ./backend:/app
    depends_on:
      - mysql
      - redis

volumes:
  mysql_data:
  redis_data:
  invoice_pdfs:
